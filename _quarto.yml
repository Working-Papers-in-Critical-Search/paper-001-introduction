project:
  type: website
  output-dir: _site

website:
  title: "Working Papers in Critical Search"
  site-url: https://working-papers-in-critical-search.github.io/paper-001-introduction/
  open-graph: true
  twitter-card: true
  # No Quarto navbar / page-footer — chrome injected via includes below
  # to match the journal home site.

format:
  html:
    theme:
      - cosmo
      - _tokens.scss
      - _custom.scss
      - _paper.scss
    toc: true
    code-fold: true
    code-tools: true
    anchor-sections: false
    title-block-style: default
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      - _includes/fonts.html
      - text: |
          <link rel="canonical" href="https://working-papers-in-critical-search.github.io/paper-001-introduction/">
          <meta property="og:url" content="https://working-papers-in-critical-search.github.io/paper-001-introduction/">
          <meta name="twitter:url" content="https://working-papers-in-critical-search.github.io/paper-001-introduction/">
    include-before-body:
      - _includes/topbar.html
      - _includes/paper-id.html
    include-after-body:
      - _includes/footer.html
      - _includes/mobile-toc.html
      - text: '<script src="https://hypothes.is/embed.js" async></script>'
  pdf:
    documentclass: scrartcl
    papersize: letter
    geometry:
      - margin=1in
    fontsize: 11pt
    linestretch: 1.15
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
    citecolor: NavyBlue
    toc: false
    number-sections: false
    pdf-engine: xelatex
    keep-tex: false
    include-in-header:
      text: |
        \usepackage{microtype}
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[L]{\small\itshape Working Papers in Critical Search}
        \fancyhead[R]{\small\thepage}
        \renewcommand{\headrulewidth}{0.4pt}

comments:
  giscus:
    repo: Working-Papers-in-Critical-Search/home
    category: "Comments"
    mapping: url
    reactions-enabled: true
    loading: lazy
    input-position: top

execute:
  freeze: auto
